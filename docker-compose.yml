services:
  frontend:
    build: .
    ports:
      - "4500:3000"
    environment:
      - NEXT_PUBLIC_BASE_URL=http://31.97.205.65:4200/api
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "4200:4200"
    environment:
      - PORT=4200
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=quickhire
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=quickhire
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

volumes:
  postgres_data:
